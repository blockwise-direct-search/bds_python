name: Stress test

on:
  schedule:
    - cron: "0 18 2 * *"
  workflow_dispatch:
    inputs:
      algorithm:
        description: Algorithm preset (Optional)
        required: false
      tough:
        description: Tough test flag, true or false (Optional)
        required: false
      dimension:
        description: Problem dimension (Optional)
        required: false
      maxfev:
        description: Maximum function evaluations (Optional)
        required: false
      random_seed:
        description: Random seed (Optional)
        required: false

run-name: ${{ github.event_name == 'workflow_dispatch' && format('Manual run algorithm {0}, tough {1}, dimension {2}, maxfev {3}, seed {4}', github.event.inputs.algorithm, github.event.inputs.tough, github.event.inputs.dimension, github.event.inputs.maxfev, github.event.inputs.random_seed) || '' }}

jobs:
  test:
    name: Stress test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        os: [ubuntu-latest, macos-latest]
        algorithm: [cbds, pbds, rbds, pads, ds]
        tough: ["false", "true"]

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run stress tests
        env:
          BDS_TEST_ALGORITHM: ${{ github.event.inputs.algorithm || matrix.algorithm }}
          BDS_TEST_TOUGH: ${{ github.event.inputs.tough || matrix.tough }}
          BDS_TEST_DIMENSION: ${{ github.event.inputs.dimension }}
          BDS_TEST_MAXFEV: ${{ github.event.inputs.maxfev }}
          BDS_TEST_SEED: ${{ github.event.inputs.random_seed }}
        run: python -m unittest tests.test_stress
