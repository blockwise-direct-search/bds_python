name: Test the correctness of gradient estimation

on:
  push:
  workflow_dispatch:

jobs:
  test:
    name: Test the correctness of gradient estimation
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: macos-15-intel
            python-version: "3.10"
        exclude:
          - os: macos-latest
            python-version: "3.10"

    steps:
      - name: Check out the repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -e .

      - name: Run gradient tests
        run: python -m unittest tests.test_gradient
